<!DOCTYPE html> <!--- represents the document type and helps browsers display pages correctly --->
<html lang="en-US"> <!-- Beginning of HTML document. 'lang' attribute declares language to assist browsers and search engines. -->
<head>
    <title>Learning HTML</title> <!-- Defines the page's title-->
<style> 
p {color:orange;}
</style> <!-- Internal CSS to change the style of the whole page-->
</head>
<body style="background-color:turquoise;"> <!-- Where content is displayed visibly -->
<div style="text-align:center;"> <!-- Often used as a container to group sections together-->
    <h1 style="font-family:Arial;">This is Heading 1</h1> <!--- Defines headings from 1 to 6. The lower the number, the more important the heading -->
    <h2 style="text-align:center;">This is Heading 2</h2>
    <h3>This is Heading 3</h3>
    <h4 style="font-size:80px;">This is heading 4</h4>
</div>

<p>This is a paragraph</p> <!-- Defines paragraphs-->
<p>This is also a paragraph</p>
<p>This is a <br> line break!</p> <!-- Defines a line break-->
<p style="color:red;">This is a red paragraph</p> <!-- 'style' attribute adds styles like colour, font and size to elements-->
<p title="With a tooltip!">This is a paragraph</p> <!-- 'title' attribute defines extra infomation about an element via a tooltip-->

<pre> <!-- Defines preformatted text-->
    Hello
    This
    Is
    Preformatted
    Text
</pre>

<a href="https://www.w3schools.com/html/default.asp" target="_blank">Click here to learn HTML</a> <!-- Defines links, which are specified in the 'href' attribute. 'target' specifies where to open the document.-->
<hr> <!-- Displays a horizontal rule to separate content-->
<img src="Johnny.jpg" alt="Johnny" width="180" height="248"> <!-- Defines images. src = source file, alt = alternative text-->

</body>
</html>
